name: Build Mac App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Install spacy Chinese model
      run: |
        python -m spacy download zh_core_web_sm

    - name: Build macOS App with PyInstaller
      run: |
        pyinstaller --windowed --noconsole --collect-all tkinterdnd2 --collect-all spacy --collect-all zh_core_web_sm --collect-all spacy_pkuseg --copy-metadata spacy --copy-metadata zh_core_web_sm --copy-metadata spacy_pkuseg --icon=NONE AutoRedactor.py

    - name: Zip the .app bundle
      run: |
        cd dist
        zip -r AutoRedactor-macOS.zip AutoRedactor.app

    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: AutoRedactor-macOS
        path: dist/AutoRedactor-macOS.zip
